name: Deploy site to GitHub Pages

# Publishes TWO versions of the site in one Pages deployment:
#   main    -> production  https://sahirssharma.github.io/WebReg-Course-Planner/
#   staging -> preview      .../WebReg-Course-Planner/preview/   (test before users see it)
# A push to either branch rebuilds both from their latest commit and redeploys.
on:
  push:
    branches: [main, staging]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout main (production)
        uses: actions/checkout@v4
        with:
          ref: main
          path: prod
      - name: Checkout staging (preview)
        uses: actions/checkout@v4
        with:
          ref: staging
          path: preview
        continue-on-error: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build production (root)
        run: |
          cd prod && python3 scripts/build_site.py
          mkdir -p "$GITHUB_WORKSPACE/_site"
          cp -a site/. "$GITHUB_WORKSPACE/_site/"
      - name: Build preview (/preview)
        run: |
          if [ -f preview/scripts/build_site.py ]; then
            cd preview && python3 scripts/build_site.py
            mkdir -p "$GITHUB_WORKSPACE/_site/preview"
            cp -a site/. "$GITHUB_WORKSPACE/_site/preview/"
          else
            echo "staging branch not present yet — skipping preview build"
          fi
      - name: Build ad site (/ads) from staging
        run: |
          # ad-supported variant (gutter ads + About/Guide/FAQ/Privacy/Terms).
          # Same tool + data as staging, just with WEBREG_ADS=1. Transition
          # site that will later move to its own domain.
          if [ -f preview/scripts/build_site.py ]; then
            cd preview && WEBREG_ADS=1 python3 scripts/build_site.py
            mkdir -p "$GITHUB_WORKSPACE/_site/ads"
            cp -a site/. "$GITHUB_WORKSPACE/_site/ads/"
          else
            echo "staging branch not present — skipping /ads build"
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
